name: Clang Coverage
on:
  workflow_call:
jobs:
  Coverage:
    runs-on: ubuntu-latest
    env:
      COMPCXX: clang++
      COMP: clang
      CXXFLAGS: "-Werror"
      LLVM_VERSION: 22
    defaults:
      run:
        working-directory: src
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Download required linux packages
        run: |
          sudo apt-get update
          sudo apt-get install -y wget ca-certificates

      - name: Install LLVM and Clang 22
        run: |
          sudo bash -c "$(wget -O - https://apt.llvm.org/llvm.sh)" ./llvm.sh "${LLVM_VERSION}"
          sudo apt-get install -y --no-install-recommends \
            clang-"${LLVM_VERSION}" \
            clang-tools-"${LLVM_VERSION}" \
            lld-"${LLVM_VERSION}" \
            libclang-rt-"${LLVM_VERSION}"-dev
          llvm_bindir="$(llvm-config-"${LLVM_VERSION}" --bindir)"
          echo "PATH=${llvm_bindir}:$PATH" >> "$GITHUB_ENV"

      - name: Show LLVM toolchain
        run: |
          clang --version
          clang++ --version
          llvm-profdata --version
          llvm-cov --version

      - name: Download the used network from the fishtest framework
        run: make net

      - name: Build coverage binary
        run: |
          rm -rf ../artifacts/coverage
          mkdir -p ../artifacts/coverage/raw
          export CXXFLAGS="-O1 -fno-inline -fprofile-instr-generate -fcoverage-mapping"
          export LDFLAGS="-fuse-ld=lld -fprofile-instr-generate"
          make clean
          make -j4 ARCH=x86-64-sse41-popcnt debug=no optimize=no build > /dev/null

      - name: Run Python harness for coverage
        run: |
          coverage_raw_dir="$(pwd)/../artifacts/coverage/raw"
          export LLVM_PROFILE_FILE="${coverage_raw_dir}/stockfish-%p.profraw"
          python3 ../tests/instrumented.py --none ./stockfish

      - name: Generate coverage reports
        run: |
          mapfile -t profraw_files < <(find ../artifacts/coverage/raw -maxdepth 1 -type f -name '*.profraw' | sort)
          if [[ ${#profraw_files[@]} -eq 0 ]]; then
            printf 'No .profraw files were generated by the coverage run.\n' >&2
            find ../artifacts/coverage -maxdepth 2 -type f | sort >&2 || true
            exit 1
          fi
          llvm-profdata merge -sparse "${profraw_files[@]}" -o ../artifacts/coverage/stockfish.profdata
          llvm-cov report ./stockfish -instr-profile=../artifacts/coverage/stockfish.profdata > ../artifacts/coverage/coverage-report.txt
          llvm-cov show ./stockfish \
            -instr-profile=../artifacts/coverage/stockfish.profdata \
            -format=html \
            -output-dir=../artifacts/coverage/html

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clang-coverage
          path: artifacts/coverage
          if-no-files-found: error
